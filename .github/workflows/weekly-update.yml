name: Weekly Archive Update

on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday at 14:00 UTC
  workflow_dispatch:        # Manual trigger for testing

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          prompt: 'Follow the instructions in .claude/commands/update-archive.md'

          # We are in CI with no extra permissions so we can let it run wild.
          claude_args: |
            --dangerously-skip-permissions

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: weekly archive update $(date +%Y-%m-%d)"
            git push
          fi

